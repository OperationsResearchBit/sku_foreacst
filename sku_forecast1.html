<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SKU Sales Forecaster</title>
    <style>
        /* Matching the "Go Board" vibe */
        body { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: #2c3e50; 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            height: 100vh;
            margin: 0;
        }

        .card {
            background: #34495e;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            width: 350px;
            border: 2px solid #8b4513; /* Woody border like the Go board */
        }

        h1 { margin-bottom: 30px; color: #ecf0f1; font-weight: 300; }

        input { 
            width: 80%; 
            padding: 12px; 
            margin-bottom: 20px; 
            border-radius: 5px; 
            border: none; 
            font-size: 16px;
            background: #ecf0f1;
        }

        button { 
            padding: 12px 30px; 
            font-size: 18px; 
            cursor: pointer; 
            background: #e67e22; 
            border: none; 
            color: white; 
            border-radius: 5px; 
            transition: 0.3s;
            box-shadow: 0 4px #d35400;
        }

        button:hover { background: #d35400; transform: translateY(2px); box-shadow: 0 2px #d35400; }
        button:active { transform: translateY(4px); box-shadow: 0 0; }

        #result { 
            margin-top: 30px; 
            font-size: 1.4rem; 
            color: #f1c40f; 
            font-weight: bold;
            min-height: 40px;
        }

        .label { font-size: 12px; color: #bdc3c7; margin-bottom: 5px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="card">
        <h1>SKU Forecaster</h1>
        
        <div class="label">Historical Sales Avg</div>
        <input type="number" id="currentSales" placeholder="e.g. 1500" />
        
        <br>
        
        <button onclick="calculateForecast()">Generate Forecast</button>
        
        <div id="result"></div>
    </div>

<script>
    function calculateForecast() {
        const input = document.getElementById('currentSales').value;
        const resultDiv = document.getElementById('result');
        
        if (!input || input <= 0) {
            resultDiv.innerText = "Please enter a valid number";
            resultDiv.style.color = "#e74c3c";
            return;
        }

        // Vibe Logic: 15% growth + random market variance for "realism"
        const base = parseFloat(input);
        const growth = 1.15;
        const variance = (Math.random() * 0.05); // 0% to 5% random bump
        const total = Math.round(base * (growth + variance));

        resultDiv.style.color = "#f1c40f";
        resultDiv.innerText = "Next Month: " + total.toLocaleString() + " units";
    }
</script>

</body>
</html>
